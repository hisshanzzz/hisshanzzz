<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="Mohamed Hisshan  AI, Data Science, Speaker, Builder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#161b22">
        <animate attributeName="stop-color" values="#161b22;#0d1117;#161b22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#21262d">
        <animate attributeName="stop-color" values="#21262d;#161b22;#21262d" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#d29922"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-0.2 0" to="0.2 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#30363d" stroke-width="1" rx="8"/>

  <!-- Grid lines -->
  <g opacity="0.15" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Floating particles -->
  <circle cx="680" cy="40" r="3" fill="#58a6ff" opacity="0.6">
    <animate attributeName="cy" values="40;30;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="80" r="2" fill="#3fb950" opacity="0.5">
    <animate attributeName="cy" values="80;70;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="720;730;720" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="130" r="2.5" fill="#d29922" opacity="0.5">
    <animate attributeName="cy" values="130;120;130" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="160" r="2" fill="#58a6ff" opacity="0.4">
    <animate attributeName="cx" values="60;70;60" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Code brackets -->
  <text x="40" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" fill="#30363d" opacity="0.8">&lt;</text>
  <text x="40" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
    &lt;
  </text>
  <text x="760" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" fill="#30363d" opacity="0.8">/&gt;</text>
  <text x="760" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    /&gt;
  </text>

  <!-- Mic icon (speaker theme) -->
  <g transform="translate(700, 155)" filter="url(#glow)">
    <rect x="-8" y="-18" width="16" height="28" rx="8" fill="none" stroke="#8b949e" stroke-width="2"/>
    <path d="M-14 0 Q-14 14 0 14 Q14 14 14 0" fill="none" stroke="#8b949e" stroke-width="2"/>
    <line x1="0" y1="14" x2="0" y2="22" stroke="#8b949e" stroke-width="2"/>
    <line x1="-8" y1="22" x2="8" y2="22" stroke="#8b949e" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" values="700 155;700 150;700 155" dur="2.5s" repeatCount="indefinite" additive="replace"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <!-- Main title -->
  <text x="400" y="78" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="36" font-weight="700" fill="#e6edf3">
    Mohamed Hisshan
  </text>

  <!-- Animated underline -->
  <rect x="250" y="88" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.9">
    <animate attributeName="width" values="0;300;300;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="400;250;250;400" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="400" y="118" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="15" fill="#8b949e">
    AI &amp; Data Science · Speaker · Builder
  </text>

  <!-- Location -->
  <text x="400" y="142" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#6e7681">
    Colombo, Sri Lanka
  </text>

  <!-- Typing cursor -->
  <rect x="558" y="106" width="2" height="16" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated status dot -->
  <circle cx="318" cy="136" r="4" fill="#3fb950">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="330" y="140" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#3fb950">
    Open to internships
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Scan line -->
  <rect x="0" y="0" width="800" height="2" fill="#58a6ff" opacity="0.15">
    <animate attributeName="y" values="0;200;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.2;0" dur="10s" repeatCount="indefinite"/>
  </rect>
</svg>
