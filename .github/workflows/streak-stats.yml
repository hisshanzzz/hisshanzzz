name: Update profile graphs

on:
  schedule:
    # Every hour so the cards catch same-day commits quickly
    - cron: "15 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize runs so overlapping triggers (push + schedule + dispatch) never
# race each other on `git push`.
concurrency:
  group: profile-graphs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          # Asia/Colombo matches your local day boundary for the streak card
          options: user=hisshanzzz&theme=radical&hide_border=true&timezone=Asia/Colombo&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.STREAK_STATS_TOKEN }}

      - name: Generate stats card (last-known-good SVG)
        continue-on-error: true
        run: |
          mkdir -p profile
          url="https://github-readme-stats-sigma-five.vercel.app/api?username=hisshanzzz&show_icons=true&theme=radical&hide_border=true&include_all_commits=true&count_private=true&cache_seconds=1800"
          tmp="$(mktemp)"
          if curl -fsSL --max-time 30 --retry 3 --retry-delay 5 -o "$tmp" "$url" \
            && [ -s "$tmp" ] \
            && head -c 400 "$tmp" | grep -qiE '<svg|<\?xml'; then
            mv "$tmp" profile/stats.svg
            echo "stats.svg refreshed ($(wc -c < profile/stats.svg) bytes)"
          else
            echo "stats card fetch failed; keeping last-known-good profile/stats.svg"
            rm -f "$tmp"
          fi

      - name: Generate activity graph (last-known-good SVG)
        continue-on-error: true
        run: |
          mkdir -p profile
          url="https://github-readme-activity-graph.vercel.app/graph?username=hisshanzzz&theme=react-dark&hide_border=true&area=true&custom_title=Contribution%20Graph"
          tmp="$(mktemp)"
          if curl -fsSL --max-time 30 --retry 3 --retry-delay 5 -o "$tmp" "$url" \
            && [ -s "$tmp" ] \
            && head -c 400 "$tmp" | grep -qiE '<svg|<\?xml'; then
            mv "$tmp" profile/activity.svg
            echo "activity.svg refreshed ($(wc -c < profile/activity.svg) bytes)"
          else
            echo "activity graph fetch failed; keeping last-known-good profile/activity.svg"
            rm -f "$tmp"
          fi

      - name: Commit profile graphs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash the freshly generated SVGs outside git so we can always re-apply
          # them cleanly on top of the latest remote. This avoids merge conflicts
          # entirely: the committed graphs are last-known-good regenerated files,
          # never something that needs merging.
          backup="$(mktemp -d)"
          for f in streak.svg stats.svg activity.svg; do
            [ -f "profile/$f" ] && cp "profile/$f" "$backup/$f"
          done

          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p profile
            for f in streak.svg stats.svg activity.svg; do
              [ -f "$backup/$f" ] && cp "$backup/$f" "profile/$f"
            done
            git add profile/streak.svg profile/stats.svg profile/activity.svg
            if git diff --cached --quiet; then
              echo "no graph changes to commit"; exit 0
            fi
            git commit -m "chore: update profile graphs"
            if git push origin main; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed (remote moved); retrying..."
            sleep $((RANDOM % 5 + 3))
          done
          echo "could not push after retries"; exit 1
